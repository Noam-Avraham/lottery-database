<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Israel Lotto Archive{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    /* ── Nav ── */
    nav {
      background: #13151f;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      height: 56px;
      gap: 0;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 1.1rem; font-weight: 800; color: #f6ad55; margin-right: 2.5rem; text-decoration: none; }
    .nav-logo span { color: #e2e8f0; font-weight: 400; font-size: 0.85rem; margin-left: 0.5rem; }
    .nav-link {
      padding: 0 1.1rem;
      height: 56px;
      display: inline-flex; align-items: center;
      color: #718096; text-decoration: none;
      font-size: 0.9rem; font-weight: 500;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .nav-link:hover { color: #e2e8f0; }
    .nav-link.active { color: #f6ad55; border-bottom-color: #f6ad55; }
    .nav-spacer { flex: 1; }
    .nav-github {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: #718096; text-decoration: none; font-size: 0.85rem;
      padding: 0.4rem 0.8rem; border-radius: 6px;
      border: 1px solid #2d3748; transition: color 0.2s, border-color 0.2s;
    }
    .nav-github:hover { color: #e2e8f0; border-color: #718096; }

    /* ── Shared utils ── */
    .container { max-width: 980px; margin: 0 auto; padding: 2.5rem 2rem; }
    .badge { background: #2d3748; padding: 0.2rem 0.7rem; border-radius: 99px; font-size: 0.78rem; color: #a0aec0; }
    .btn { padding: 0.65rem 1.6rem; border: none; border-radius: 8px; font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary   { background: #f6ad55; color: #0f1117; }
    .btn-secondary { background: #2d3748; color: #e2e8f0; }
    .error-msg { color: #fc8181; font-size: 0.9rem; margin-top: 0.8rem; }

    .ball {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 50%;
      font-size: 0.78rem; font-weight: 700;
      background: #2d3748; color: #e2e8f0; margin: 1px;
    }
    .ball.hit         { background: #f6ad55; color: #0f1117; }
    .ball.strong      { background: #2d7d4f; color: #68d391; border: 2px solid #2d7d4f; }
    .ball.strong-hit  { background: #38a169; color: white; }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/v2/">Lotto<span>Archive</span></a>
  <a class="nav-link {% if active=='home' %}active{% endif %}"   href="/v2/">Home</a>
  <a class="nav-link {% if active=='search' %}active{% endif %}" href="/v2/search">Explore</a>
  <a class="nav-link {% if active=='facts' %}active{% endif %}"  href="/v2/facts">Facts</a>
  <a class="nav-link {% if active=='lucky' %}active{% endif %}"  href="/v2/lucky">Lucky Pick</a>
  <div class="nav-spacer"></div>
  <span style="font-size:0.78rem; color:#4a5568; margin-right:1rem;">Developed by Noam Avraham &amp; Claude Code</span>
  <button onclick="switchTheme()" style="
    display:inline-flex; align-items:center; gap:0.4rem;
    background:none; border:1px solid #2d3748; border-radius:6px;
    color:#a0aec0; font-size:0.8rem; font-weight:500; cursor:pointer;
    padding:0.35rem 0.75rem; margin-right:0.75rem;
    transition:color 0.2s, border-color 0.2s;
  " onmouseover="this.style.color='#e2e8f0';this.style.borderColor='#718096'"
     onmouseout="this.style.color='#a0aec0';this.style.borderColor='#2d3748'">
    Style
  </button>
  <script>
    function switchTheme() {
      const p = window.location.pathname;
      const h = window.location.hash;
      const stripped = p.replace(/^\/v2/, '') || '/';
      window.location.href = stripped + h;
    }
  </script>
  <a class="nav-github" href="https://github.com/Noam-Avraham/lottery-database" target="_blank" rel="noopener">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.729.083-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
    </svg>
    GitHub
  </a>
</nav>

{% block content %}{% endblock %}

</body>
</html>
